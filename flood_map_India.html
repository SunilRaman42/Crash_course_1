<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Floods in India</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #f0f4f8; }
        #map { height: 100%; width: 100%; }
        .panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 64, 128, 0.2); font-family: sans-serif; 
            width: 250px; border-left: 5px solid #007bff;
        }
        h2 { margin: 0 0 5px 0; color: #004085; font-size: 1.2em; }
        p { margin: 5px 0; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>India Flood History</h2>
        <p>Showing all historical flood events recorded for India in the DFO archive.</p>
        <p><strong>Markers:</strong> Individual flood points.</p>
    </div>
    <div id="map"></div>
    <script src="Day 2 Flood mapping/india_points.js"></script>
    <script src="hospital_data_UP.js"></script>
    <script src="hospitals_at_risk_UP.js"></script>
    <script>
        const map = L.map('map').setView([26.8467, 82.0], 7); // Focused on Eastern UP where at-risk clusters are
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Flood Layer
        const floodLayer = L.layerGroup();
        indiaData.forEach(p => {
            const sev = p.severity;
            let fillColor;
            if (sev === 1 || String(sev) === '1.0') fillColor = '#7fbfff';
            else if (sev === 1.5 || String(sev) === '1.5') fillColor = '#ff8c00';
            else if (sev === 2 || String(sev) === '2.0') fillColor = '#ff0000';
            else fillColor = '#007bff';

            L.circleMarker([p.lat, p.lng], {
                radius: 5,
                fillColor: fillColor,
                color: "#004085",
                weight: 1,
                opacity: 0.8,
                fillOpacity: 0.8
            }).bindPopup(`
                <div style="font-family: sans-serif;">
                    <b style="color:#d32f2f">Flood Event</b><br>
                    <b>Date:</b> ${p.began || p.date || 'N/A'}<br>
                    <b>Cause:</b> ${p.cause || 'N/A'}<br>
                    <b>Severity:</b> ${p.severity || 'N/A'}
                </div>
            `).addTo(floodLayer);
        });
        floodLayer.addTo(map);

        // Hospital Layer (All)
        const hospitalLayer = L.layerGroup();
        const baseHospitalIcon = L.divIcon({
            html: `<div style="background:#007bff; width:8px; height:8px; border-radius:50%; border:1px solid white;"></div>`,
            className: 'hospital-dot',
            iconSize: [8, 8],
            iconAnchor: [4, 4]
        });

        hospitalDataUP.forEach(h => {
            L.marker([h.lat, h.lng], { icon: baseHospitalIcon })
            .bindPopup(`<b>${h.name}</b><br>${h.city}`)
            .addTo(hospitalLayer);
        });
        hospitalLayer.addTo(map);

        // At-Risk Layers
        const risk5kmLayer = L.layerGroup();
        const risk10kmLayer = L.layerGroup();

        const createPlusIcon = (color) => L.divIcon({
            html: `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="11" fill="${color}" stroke="white" stroke-width="1.5"/>
                    <path d="M12 7V17M7 12H17" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>`,
            className: 'risk-marker',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        hospitalsAtRiskUP.radius_5km.forEach(h => {
            L.marker([h.lat, h.lng], { icon: createPlusIcon('#ff0000') })
            .bindPopup(`
                <div style="font-family: sans-serif;">
                    <b style="color:#ff0000">⚠️ HIGH RISK HOSPITAL (5km)</b><br>
                    <b>Name:</b> ${h.name}<br>
                    <b>Distance:</b> ${h.distance_km} km to nearest flood<br>
                    <b>Flood Cause:</b> ${h.flood_cause}
                </div>
            `).addTo(risk5kmLayer);
        });

        hospitalsAtRiskUP.radius_10km.forEach(h => {
            L.marker([h.lat, h.lng], { icon: createPlusIcon('#ff8c00') })
            .bindPopup(`
                <div style="font-family: sans-serif;">
                    <b style="color:#ff8c00">⚠️ AT RISK HOSPITAL (10km)</b><br>
                    <b>Name:</b> ${h.name}<br>
                    <b>Distance:</b> ${h.distance_km} km to nearest flood<br>
                    <b>Flood Cause:</b> ${h.flood_cause}
                </div>
            `).addTo(risk10kmLayer);
        });

        risk5kmLayer.addTo(map);
        risk10kmLayer.addTo(map);

        // Layer Control
        const overlays = {
            "Flood Events": floodLayer,
            "All Hospitals": hospitalLayer,
            "<span style='color:red'>Hospitals within 5km</span>": risk5kmLayer,
            "<span style='color:orange'>Hospitals within 10km</span>": risk10kmLayer
        };
        L.control.layers(null, overlays, {collapsed: false}).addTo(map);

        // Legend
        const legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            div.style.background = 'white';
            div.style.padding = '10px';
            div.style.borderRadius = '5px';
            div.style.boxShadow = '0 2px 6px rgba(0,0,0,0.2)';
            div.style.fontSize = '0.9em';
            div.innerHTML = `
                <div style="margin-bottom:8px"><b>Flood Severity</b><br>
                <i style="background:#7fbfff;width:12px;height:12px;display:inline-block;margin-right:6px;border:1px solid #004085"></i> 1.0<br>
                <i style="background:#ff8c00;width:12px;height:12px;display:inline-block;margin-right:6px;border:1px solid #004085"></i> 1.5<br>
                <i style="background:#ff0000;width:12px;height:12px;display:inline-block;margin-right:6px;border:1px solid #004085"></i> 2.0</div>
                
                <div><b>Hospital Proximity</b><br>
                <i style="background:#ff0000;width:12px;height:12px;display:inline-block;margin-right:6px;border:1.5px solid white;border-radius:50%"></i> 5km Radius (High Risk)<br>
                <i style="background:#ff8c00;width:12px;height:12px;display:inline-block;margin-right:6px;border:1.5px solid white;border-radius:50%"></i> 10km Radius (At Risk)</div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
